<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="flex justify-center border-b-2 border-gray-300 mb-10">
        <img src="logo.png" alt="Facebook Logo" class="w-32 m-5">
    </header>
    <main class="flex justify-center">
        <div class="w-2/3">
            <h4 class="mb-4 font-semibold">Log in to Facebook</h4>
            <form action="">
                <fieldset>
                    <input type="text" placeholder="Email or phone number" class="w-full p-2 py-4 mb-4 border border-gray-300 rounded-xl text-black font-semibold">

                    <input type="password" placeholder="Password" class="w-full p-2 py-4  mb-4 border border-gray-300 rounded-xl font-semibold">
                    <button class="w-full bg-blue-600 text-white p-2 rounded-xl mb-4 font-semibold">Log in</button>
                    <div class="flex justify-center">
                        <a href="#" class="text-black font-semibold text-sm">Forgotten password?</a>
                    </div>
                    <hr class="my-6">
                    <button class="w-full bg-green-600 text-white p-2 rounded-xl font-semibold">Create New Account</button>
                </fieldset>
            </form>
        </div>
        
    </main>
</body>
</html>
