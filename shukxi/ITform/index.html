<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>IT FORM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">">
</head>
<body>
    <div class="form container">
        <h2>IT Form</h2>

        <form action="#" method="post"></form>

        <h4>Student Information</h4>
        <label for="">Name of Student</label>
        <input type="text" name="fullname">

        <label for="">Technical college</label>
        <input type="text" name="" id="">

        <label for="">Student's Id Number</label>
        <input type="text" name="" id="">

        <label for="">Gender</label>
        <select name="gender" id="">
            <option value="">Select</option>
            <option value="">Male</option>
            <option value="">Female</option>
            <option value="">Other</option>
        </select>

        <h4>IT Center information</h4>
        <label for="">Place of Dual Technical Training</label>
        <input type="text" name="" id="">

        <label for="">Location of Company</label>
        <input type="text" name="" id="">

        <label for="">Name of Industry Road Supervisor</label>
        <input type="text" name="" id="">

        <label for="">Phone Number</label>
        <input type="tel" name="" id="">

        <label for="">Date</label>
        <input type="date" name="" id="date">
    </div>
    
    <button type="submit">Submit</button>
</body>
</html>
