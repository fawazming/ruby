<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
        <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="flex justify-center border-b-2 m-5">
        <img src="logo.png" alt="Facebook logo" class="w-32 m-5">
    </header>
    <main class="flex justify-center">
        <div class="w-2/3">
        <h4 class="mb-4 font-semibold">Log in to Facebook</h4>
        <form action="">
            <fieldset>
                <input type="text" placeholder="Email address or mobile number" class="w-full p-2 py-4 mb-4 border border-gray-300 rounded-xl text-black font-semibold">
                <input type="password" placeholder="Password"  class="w-full p-2 py-4 mb-4 border border-gray-300 rounded-xl">
                <button class="w-full bg-blue-600 text-white p-2 rounded-3xl mb-4 font-semibold">Log in</button>
                <div class="flex justify-center">
                <a href="#" class="text-black font-semibold text-sm">Forgotten password?</a>
                </div>
                <hr class="my-6">
                <button class="w-full bg-green-600 text-white p-2 rounded-3xl">Create New Account</button>
        </fieldset>
        </form>
        </div>
            
    </main>
    
</body>
</html>
